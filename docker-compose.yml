version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: clinic_db
    environment:
      POSTGRES_USER: clinicuser
      POSTGRES_PASSWORD: clinicpass
      POSTGRES_DB: clinicdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinicuser -d clinicdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: clinic_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://clinicuser:clinicpass@db:5432/clinicdb
      SECRET_KEY: your-secret-key-change-this-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: clinic_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@clinic.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data: